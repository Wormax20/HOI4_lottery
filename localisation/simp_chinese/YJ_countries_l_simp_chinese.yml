KoKi_YJ_NEW.1.title: "莫斯科红场大阅兵"
KoKi_YJ_NEW.1.desc: "苏联领导人[SOV.GetLeader]在莫斯科举行红场阅兵并发表演讲:\n同志们!德寇背信弃义的进攻,造成了威胁我国的危险。我们暂时失去了一些区域。敌人指望在第一次打击之后,我们国家立即屈膝投降。可是,敌人大大的失算了。陆军和海军虽然遭到暂时的失利,但还是在全部战线上英勇的击退着敌人的攻击.\n红军战士,政治工作人员,游击队同志们!全世界都望着你们,认定你们是能够消灭德国侵略者的力量。陷在德国侵略者枷锁下被奴役的欧洲各国人民都指望着你们,你们所进行的战争是解放的战争,正义的战争。\n让我们的伟大祖先的英姿,在这次战争中鼓舞着你们吧!让伟大列宁的胜利旗帜指引着你们吧!\n我们光荣的祖国万岁!我们祖国的自由和独立万岁!\n在列宁旗帜下向胜利前进!"
KoKi_YJ_NEW.1.a: "向着胜利前进!"
KoKi_YJ_NEW.1.b: "何意味?"
KoKi_YJ_NEW.1.c: "有点意思"


KoKi_YJ_NEW.2.title: "大西洋宪章"
KoKi_YJ_NEW.2.desc: "美利坚合众国,大不列颠及北爱尔兰联合王国等国家的联合宣言\n对于[GetDateText]美利坚合众国总统和大不列颠及北爱尔兰联合王国首相所作联合宣言称为大西洋宪章内所载宗旨与原则的共同方案业已表示赞同.深信完全战胜它们的敌国对于保卫生命,自由,独立和宗教自由并对于保全其本国和其他各国的人权和正义非常重要,同时,它们正对力图征服世界的野蛮和残暴的力量从事共同的斗争,兹宣告:\n(一)每一政府各自保证对与各该政府作战的三国同盟成员国及其附从者使用其全部资源,不论军事的或经济的.(二)每一政府各自保证与本宣言签字国政府合作,并不与敌人缔结单独停战协定或和约.可能将在战胜希特勒主义的斗争中给予物质上援助和贡献的其他国家得以加入上述宣言.  "
KoKi_YJ_NEW.2.a: "我们必将胜利!"
KoKi_YJ_NEW.2.b: "王师要上岸了?"
KoKi_YJ_NEW.2.c: "那就来罢"
KoKi_YJ_NEW.2.d: "yee"

KoKi_YJ_NEW.bbls.title: "巴巴罗萨行动!"
KoKi_YJ_NEW.bbls.desc: "德意志国防军最高统帅部通告\n对于德意志帝国向苏维埃联盟发动之军事行动,兹称为巴巴罗萨行动.本日拂晓,德意志陆海空军已在广阔战线上越过边境,对苏维埃武装力量实施先制打击.柏林方面宣称,此举旨在应对来自东方之持续威胁,并彻底消除对欧洲秩序之潜在危险.\n\n德意志帝国及其盟国,将动用全部军事与工业力量,对苏维埃军队实施迅速而集中的打击,以求在短期内摧毁其作战能力.\n随着战火在东线全面展开,一场决定欧洲未来走向之大战已然开启.广袤的东部平原正成为新的战场,其结局尚未可知,但其代价与影响,势必波及整个大陆."
KoKi_YJ_NEW.bbls.zx: "我们必将胜利!"
KoKi_YJ_NEW.bbls.tm: "希望苏联能抗住攻势"
KoKi_YJ_NEW.bbls.gc: "让他们来吧!"


KoKi_YJ_NEW.bfzc.title: "北非正在总动员!"
KoKi_YJ_NEW.bfzc.desc: "北非战区联合通告\n对于在北非地区所展开之全面军事行动,兹称为北非总动员.自地中海沿岸至撒哈拉腹地,交战双方正迅速集结兵力,战区规模不断扩大.北非之战略地位,关乎地中海航线与殖民体系之稳定,亦成为双方争夺主动权之关键所在.\n随着双方力量不断投入,北非战场正由局部冲突转变为全面对抗.沙漠与海岸线之间的广阔空间,正在成为新的决战区域,其走向不仅关系地区控制权,亦将对整个战争格局产生深远影响."
KoKi_YJ_NEW.bfzc.zx: "一雪前耻!"
KoKi_YJ_NEW.bfzc.tm: "来试试看!"
KoKi_YJ_NEW.bfzc.gc: "希望同盟能抗住攻势"




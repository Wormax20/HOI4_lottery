 ChinaTaiwan_event.100.t: "残存海军舰队抵台"
 ChinaTaiwan_event.100.d: "内战中受损的舰队抵达台湾岛，这将会成为我们的助力。"
 ChinaTaiwan_event.100.a: "好"

 ChinaTaiwan_event.101.t: "陆军部队撤退来台"
 ChinaTaiwan_event.101.d: "我们在内战中剩余的有生力量已经透过运输船转移到台湾。"
 ChinaTaiwan_event.101.a: "好"

 ChinaTaiwan_event.102.t: "共军占领了上海"
 ChinaTaiwan_event.102.d: "赤匪进驻了租界地区，我们丢失了上海的控制权。"
 ChinaTaiwan_event.102.a: "该死的"

 ChinaTaiwan_event.103.t: "台湾方面请求我方援助"
 ChinaTaiwan_event.103.d: "我们已收到来自台湾方面送来的请求，期望我们援助他们。"
 ChinaTaiwan_event.103.a: "当然，我们会援助他们。"
 ChinaTaiwan_event.103.b: "那是什么小岛，没听过。"

 ChinaTaiwan_event.104.t: "日方援助抵达"
 ChinaTaiwan_event.104.d: "日本方面很慷慨的援助我们，相关援助已到港了！"
 ChinaTaiwan_event.104.a: "太好了"

 ChinaTaiwan_event.105.t: "日方拒绝"
 ChinaTaiwan_event.105.d: "日本方面拒绝的我们的请求，只能靠我们自己了。"
 ChinaTaiwan_event.105.a: "草"

 ChinaTaiwan_event.106.t: "在台皇民"
 ChinaTaiwan_event.106.d: "我们在台湾台中地区抓获一位自称「日本皇民」的东海大学日文系学生。"
 ChinaTaiwan_event.106.a: "把他送进太平洋"


l_simp_chinese:
 KimKorea_focus_IChi: "稳定局势"
 KimKorea_focus_IChi_desc: "朝鲜的新生是全体国民共同努力的结果，现在的局势还不明朗，稳定国家才是重中之重。"
 KimKorea_focus_IChi_1: "与共产党合作"
 KimKorea_focus_IChi_1_desc: "共产党是当年抗日的骨干力量，或许我们可以与他们合作。"
 KimKorea_focus_IChi_1_1: "共产党要求掌控电台局"
 KimKorea_focus_IChi_1_1_desc: "朝鲜电台局虽说不是一个重要的位置，但他们好像在密谋什么。"
 KimKorea_focus_IChi_1_2: "精简政府"
 KimKorea_focus_IChi_1_2_desc: "过去庞大的殖民政府体系拖累了我们的政府效率，必须做出改变了。"
 KimKorea_focus_IChi_1_3: "打击贪腐"
 KimKorea_focus_IChi_1_3_desc: "我们清楚政府内部有多少和珅，现在我们必须出重拳将他们一网打尽。"
 KimKorea_focus_IChi_1_4: "开发南部资源"
 KimKorea_focus_IChi_1_4_desc: "我们的红色好友很积极的参与资源的开发。"
 KimKorea_focus_IChi_1_5: "共产党夺权"
 KimKorea_focus_IChi_1_5_desc: "我们太盲目相信他人了，到最后发现已无法阻止，朝鲜民主已死。"
 KimKorea_focus_IChi_3: "清洗反对派"
 KimKorea_focus_IChi_3_desc: "拥有其余思想的皆是敌人，我们会不留余力的清除他们。"
 KimKorea_focus_IChi_4: "无害化反对派"
 KimKorea_focus_IChi_4_desc: "我们已经胜利了，接下来将一致对外，内部斗争该歇歇了，不要再造成无谓的牺牲。"
 KimKorea_focus_IChi_3_1: "共产国际的支援"
 KimKorea_focus_IChi_3_1_desc: "接受来自共产国际的资源，将对我们国家的发展提供强大助力。"
 KimKorea_focus_IChi_3_2: "窃取西方资本主义的技术"
 KimKorea_focus_IChi_3_2_desc: "资本主义的技术太香了"
 KimKorea_focus_IChi_6: "与苏联接触"
 KimKorea_focus_IChi_6_desc: "与苏联接触对目前的我们来说只有好处没有坏处。"
 KimKorea_focus_IChi_6_1: "与美国接触"
 KimKorea_focus_IChi_6_1_desc: "与美国接触是一项危险的举动，但带来的回报也是实际的。"

l_simp_chinese:
 KimKorea_news.1.t: "太阳自东方升起"
 KimKorea_news.1.d: "金色的太阳自东方升起。\n\n在伟大领袖金日成同志的英明领导下，朝鲜半岛迎来了崭新的时代。\n\n人民欢欣鼓舞，工厂机器日夜轰鸣，农田谷浪翻滚如海，工人、农民与知识分子团结在党的旗帜之下，共同迈向光明的未来。\n\n当金色的太阳于东方升起时，一切奇迹都将成为理所当然。"
 KimKorea_news.1.a: "万岁!"
 KimKorea_news_ArmyOK.1.t: "朝鲜宣布完成军事改革"
 KimKorea_news_ArmyOK.1.d: "在伟大领袖的英明指导下，朝鲜军事改革圆满完成。\n\n人民军现代化建设取得重大成果，国防力量空前增强，保卫祖国与革命事业的钢铁力量更加巩固。"
 KimKorea_news_ArmyOK.1.a: "万岁!"
 KimKorea_news_Victory.1.t: "主体思想的胜利"
 KimKorea_news_Victory.1.d: "在伟大领袖的英明领导下，主体思想光芒照耀祖国大地。\n\n全体人民团结一心，以钢铁般的意志克服重重困难，创造了新的奇迹。\n\n今天的胜利证明，唯有坚持主体思想，才能开创民族复兴与国家富强之路。\n\n朝鲜人民将永远高举主体旗帜，为祖国的繁荣与光荣未来奋勇前进。"
 KimKorea_news_Victory.1.a: "万岁!"

 KimKorea_event.100.t: "金将军成功整合派系"
 KimKorea_event.100.d: "金将军成功将朝鲜政治内的派系整合"
 KimKorea_event.100.a: "万岁!"
 KimKorea_event_Tech.100.t: "金将军重视科研"
 KimKorea_event_Tech.100.d: "金将军以身作则投入国家科研事业"
 KimKorea_event_Tech.100.a: "万岁!"

 KimKorea_event_BacktoJapan.200.t: "朝鲜回归"
 KimKorea_event_BacktoJapan.200.d: "朝鲜政府决定重新加入大日本帝国"
 KimKorea_event_BacktoJapan.200.a: "万岁!"
 KimKorea_event_BacktoJapan.200.b: "滚蛋，哪个王八糕子提的"